<section class="border-b border-zinc-800 py-16">
  <div class="grid gap-6 md:grid-cols-3">
    @for (service of services; track service.title) {
      <article class="rounded-2xl border border-zinc-700 bg-zinc-950 p-6 shadow-sm shadow-black/30 transition hover:-translate-y-1 hover:border-amber-400/60 hover:shadow-md hover:shadow-amber-500/10">
        <h3 class="text-xl font-bold text-zinc-100">{{ service.title }}</h3>
        <p class="mt-3 text-sm leading-relaxed text-zinc-300">{{ service.description }}</p>
      </article>
    }
  </div>
</section>
