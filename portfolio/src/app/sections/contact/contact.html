<section id="contacto" class="py-16">
  <div class="grid gap-8 rounded-3xl border border-zinc-700 bg-zinc-950 p-6 shadow-sm shadow-black/40 md:grid-cols-[1fr_1.2fr] md:p-8">
    <div>
      <p class="text-sm font-semibold uppercase tracking-wider text-amber-300">Contactame</p>
      <h2 class="mt-2 text-3xl font-bold text-zinc-100">Tienes una idea? Cuentamela</h2>
      <p class="mt-4 text-zinc-300">
        Esta seccion es la base inicial. En la siguiente iteracion conectamos el formulario a EmailJS, Resend o tu API.
      </p>
    </div>

    <form class="grid gap-4">
      <label class="grid gap-1 text-sm font-semibold text-zinc-300">
        Tu nombre
        <input type="text" class="rounded-xl border border-zinc-700 bg-zinc-900 px-3 py-2 font-medium text-zinc-100 outline-none ring-amber-300 transition focus:border-amber-400 focus:ring" />
      </label>

      <label class="grid gap-1 text-sm font-semibold text-zinc-300">
        Tu email
        <input type="email" class="rounded-xl border border-zinc-700 bg-zinc-900 px-3 py-2 font-medium text-zinc-100 outline-none ring-amber-300 transition focus:border-amber-400 focus:ring" />
      </label>

      <label class="grid gap-1 text-sm font-semibold text-zinc-300">
        Tu mensaje
        <textarea rows="5" class="rounded-xl border border-zinc-700 bg-zinc-900 px-3 py-2 font-medium text-zinc-100 outline-none ring-amber-300 transition focus:border-amber-400 focus:ring"></textarea>
      </label>

      <button type="button" class="rounded-xl bg-amber-400 px-5 py-3 text-sm font-semibold text-zinc-950 transition hover:bg-amber-300">
        Enviar
      </button>
    </form>
  </div>
</section>
